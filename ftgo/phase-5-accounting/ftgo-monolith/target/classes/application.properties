spring.application.name=ftgo-monolith
server.port=8080

spring.datasource.url=jdbc:h2:mem:ftgodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Restaurant Service via Eureka
restaurant-service.url=http://RESTAURANT-SERVICE

# Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.compression-type=snappy

# Kafka Consumer (delivery + kitchen + accounting events)
spring.kafka.consumer.group-id=ftgo-monolith
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=com.example.delivery.event.DeliveryEvent:com.example.event.DeliveryEvent,com.example.kitchen.event.KitchenEvent:com.example.event.KitchenEvent,com.example.accounting.event.AccountingEvent:com.example.event.AccountingEvent
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

# Resilience4j
resilience4j.circuitbreaker.instances.restaurant-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.restaurant-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.restaurant-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.restaurant-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.restaurant-service.minimum-number-of-calls=5
resilience4j.retry.instances.restaurant-service.max-attempts=3
resilience4j.retry.instances.restaurant-service.wait-duration=500ms
resilience4j.ratelimiter.instances.restaurant-service.limit-for-period=50
resilience4j.ratelimiter.instances.restaurant-service.limit-refresh-period=1s

# Actuator
management.endpoints.web.exposure.include=health,info,circuitbreakers,metrics
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
