spring.application.name=notification-service
server.port=8081

# H2 Database (notification-service has its own DB)
spring.datasource.url=jdbc:h2:mem:notificationdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/h2-console

# ── Kafka Consumer ──
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=com.example.event.NotificationEvent:com.example.notification.event.NotificationEvent

# Safety: disable auto-commit, let Spring Kafka manage offsets after processing
spring.kafka.consumer.enable-auto-commit=false

# Latency: fetch at least 1 byte immediately (low latency over throughput for notifications)
spring.kafka.consumer.properties.fetch.min.bytes=1
spring.kafka.consumer.properties.fetch.max.wait.ms=500

# Throughput: max records per poll (keep small for notifications — fast processing per batch)
spring.kafka.consumer.max-poll-records=100

# Availability: session & heartbeat timeouts (detect dead consumers quickly)
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.properties.heartbeat.interval.ms=10000

# Safety: max poll interval (max time between polls before consumer is kicked from group)
spring.kafka.consumer.properties.max.poll.interval.ms=300000

# Safety: read only committed messages (for transactional producers)
spring.kafka.consumer.properties.isolation.level=read_committed

# Availability: partition assignment strategy (cooperative rebalancing — no stop-the-world)
spring.kafka.consumer.properties.partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

# ── Spring Kafka Listener ──
# AckMode RECORD: commit offset after each record is processed (safest, no message loss)
spring.kafka.listener.ack-mode=record
# Concurrency: number of consumer threads (scale with partition count)
spring.kafka.listener.concurrency=1
