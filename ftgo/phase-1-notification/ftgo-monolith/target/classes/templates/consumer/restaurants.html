<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGO - Browse Restaurants</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; }
        .header { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3em; }
        .header a { color: white; text-decoration: none; opacity: 0.9; font-size: 0.9em; }
        .header a:hover { opacity: 1; }
        .topbar { background: white; border-bottom: 1px solid #eee; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
        .topbar a { color: #27ae60; text-decoration: none; font-weight: 600; font-size: 0.9em; padding: 6px 12px; border-radius: 6px; }
        .topbar a:hover, .topbar a.active { background: #e8f5e9; }
        .topbar .user-select { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #666; }
        .topbar select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85em; }
        .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 1.4em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-header { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 16px 20px; }
        .card-header h3 { font-size: 1.15em; margin-bottom: 2px; }
        .card-header p { opacity: 0.85; font-size: 0.85em; }
        .card-body { padding: 16px 20px; }
        .menu-table { width: 100%; border-collapse: collapse; }
        .menu-table th { text-align: left; padding: 8px 6px; font-size: 0.75em; text-transform: uppercase; color: #999; border-bottom: 2px solid #f0f0f0; }
        .menu-table td { padding: 10px 6px; border-bottom: 1px solid #f5f5f5; font-size: 0.9em; }
        .menu-table tr:last-child td { border-bottom: none; }
        .price { color: #27ae60; font-weight: 600; }
        .qty-input { width: 50px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-size: 0.85em; }
        .check { width: 18px; height: 18px; accent-color: #27ae60; cursor: pointer; }
        .order-section { padding: 16px 20px; border-top: 1px solid #f0f0f0; background: #fafafa; border-radius: 0 0 12px 12px; }
        .address-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9em; margin-bottom: 12px; }
        .address-input:focus { outline: none; border-color: #27ae60; box-shadow: 0 0 0 3px rgba(39,174,96,0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 600; color: white; transition: all 0.2s; }
        .btn-order { background: #27ae60; width: 100%; }
        .btn-order:hover { background: #219a52; }
        .btn-order:disabled { background: #bdc3c7; cursor: not-allowed; }
        label.addr { font-size: 0.85em; color: #555; display: block; margin-bottom: 6px; font-weight: 500; }
    </style>
    <style th:replace="~{fragments/navbar :: navbar-styles}"></style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar('consumer-restaurants')}"></nav>
    <div class="topbar">
        <a href="/consumer/restaurants" class="active">Browse Restaurants</a>
        <a th:href="@{'/consumer/orders?consumerId=' + ${consumerId}}">My Orders</a>
        <div class="user-select">
            <span>Logged in as:</span>
            <select onchange="window.location='/consumer/restaurants?consumerId='+this.value">
                <option th:each="c : ${consumers}" th:value="${c.id}" th:text="${c.name}" th:selected="${c.id == consumerId}">Consumer</option>
            </select>
        </div>
    </div>
    <div class="container">
        <h2>Browse Restaurants</h2>
        <div class="grid">
            <div th:each="restaurant : ${restaurants}" class="card">
                <div class="card-header">
                    <h3 th:text="${restaurant.name}">Restaurant Name</h3>
                    <p th:text="${restaurant.address}">Address</p>
                </div>
                <form th:action="@{/consumer/orders}" method="post" th:id="'form_' + ${restaurant.id}">
                    <input type="hidden" name="consumerId" th:value="${consumerId}" />
                    <input type="hidden" name="restaurantId" th:value="${restaurant.id}" />
                    <div class="card-body">
                        <table class="menu-table">
                            <thead>
                                <tr><th></th><th>Item</th><th>Price</th><th>Qty</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${restaurant.menuItems}" th:if="${item.available}">
                                    <td>
                                        <input type="checkbox" class="check"
                                               th:data-itemid="${item.id}"
                                               th:data-formid="${restaurant.id}"
                                               onchange="toggleItem(this)" />
                                    </td>
                                    <td th:text="${item.name}">Item</td>
                                    <td class="price" th:text="'Rs.' + ${item.price}">Price</td>
                                    <td>
                                        <input type="number" min="1" value="1" class="qty-input"
                                               th:id="'qty_' + ${restaurant.id} + '_' + ${item.id}" disabled />
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="order-section">
                        <label class="addr">Delivery Address</label>
                        <input type="text" name="deliveryAddress" class="address-input"
                               placeholder="Enter your delivery address" required />
                        <button type="submit" class="btn btn-order"
                                th:id="'btn_' + ${restaurant.id}" disabled>
                            Select items to order
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function toggleItem(checkbox) {
            var itemId = checkbox.dataset.itemid;
            var formId = checkbox.dataset.formid;
            var form = document.getElementById('form_' + formId);
            var qtyInput = document.getElementById('qty_' + formId + '_' + itemId);
            var btn = document.getElementById('btn_' + formId);

            if (checkbox.checked) {
                qtyInput.disabled = false;
                var hid = document.createElement('input');
                hid.type='hidden'; hid.name='menuItemIds'; hid.value=itemId;
                hid.id='hid_'+formId+'_'+itemId;
                form.appendChild(hid);
                var hqty = document.createElement('input');
                hqty.type='hidden'; hqty.name='quantities';
                hqty.id='hqty_'+formId+'_'+itemId;
                hqty.value = qtyInput.value;
                form.appendChild(hqty);
                qtyInput.onchange = function(){ hqty.value = qtyInput.value; };
            } else {
                qtyInput.disabled = true;
                var e1 = document.getElementById('hid_'+formId+'_'+itemId);
                var e2 = document.getElementById('hqty_'+formId+'_'+itemId);
                if(e1) e1.remove();
                if(e2) e2.remove();
            }

            // Update button state
            var checked = form.querySelectorAll('input[type=checkbox]:checked');
            if (checked.length > 0) {
                btn.disabled = false;
                btn.textContent = 'Place Order (' + checked.length + ' item' + (checked.length>1?'s':'') + ')';
            } else {
                btn.disabled = true;
                btn.textContent = 'Select items to order';
            }
        }
    </script>
</body>
</html>
