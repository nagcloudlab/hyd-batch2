spring.application.name=ftgo-monolith
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:ftgodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/h2-console

# Initialize data after schema creation
spring.sql.init.mode=always

# ── Kafka Producer ──
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Safety: acks=all ensures all in-sync replicas acknowledge before producer considers msg sent
spring.kafka.producer.acks=all

# Idempotent producer: prevents duplicate messages on retry (exactly-once semantics)
spring.kafka.producer.properties.enable.idempotence=true

# Retries: high retry count with backoff for transient broker failures
spring.kafka.producer.retries=2147483647
spring.kafka.producer.properties.retry.backoff.ms=100
spring.kafka.producer.properties.delivery.timeout.ms=120000

# Throughput: batch messages for efficiency (16KB batches, wait up to 5ms to fill batch)
spring.kafka.producer.batch-size=16384
spring.kafka.producer.properties.linger.ms=5

# Memory: buffer size for pending messages (32MB)
spring.kafka.producer.buffer-memory=33554432

# Compression: reduces network I/O and storage (snappy = good balance of speed/compression)
spring.kafka.producer.compression-type=snappy

# Ordering: max in-flight requests per connection (<=5 for idempotent producer to maintain ordering)
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
