<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGO - My Orders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; }
        .header { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3em; }
        .header a { color: white; text-decoration: none; opacity: 0.9; font-size: 0.9em; }
        .topbar { background: white; border-bottom: 1px solid #eee; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
        .topbar a { color: #27ae60; text-decoration: none; font-weight: 600; font-size: 0.9em; padding: 6px 12px; border-radius: 6px; }
        .topbar a:hover, .topbar a.active { background: #e8f5e9; }
        .topbar .user-select { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #666; }
        .topbar select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85em; }
        .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 1.4em; }
        .order-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; overflow: hidden; }
        .order-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .order-header .left h3 { color: #2c3e50; font-size: 1em; }
        .order-header .left span { color: #999; font-size: 0.8em; }
        .order-body { padding: 16px 20px; }
        .order-items { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .order-item { background: #f8f9fa; padding: 4px 10px; border-radius: 6px; font-size: 0.85em; color: #555; }
        .order-meta { display: flex; gap: 20px; font-size: 0.85em; color: #888; }
        .order-meta b { color: #2c3e50; }
        .status { padding: 5px 14px; border-radius: 20px; font-size: 0.8em; font-weight: 600; color: white; display: inline-block; }
        .status.PLACED { background: #3498db; }
        .status.APPROVED { background: #2ecc71; }
        .status.PREPARING { background: #f39c12; }
        .status.READY_FOR_PICKUP { background: #e67e22; }
        .status.PICKED_UP { background: #9b59b6; }
        .status.DELIVERED { background: #27ae60; }
        .status.CANCELLED { background: #e74c3c; }
        .empty { text-align: center; padding: 60px 20px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .empty p { color: #999; margin-bottom: 16px; }
        .empty a { color: #27ae60; font-weight: 600; }
        /* Progress tracker */
        .progress { display: flex; align-items: center; gap: 0; margin-top: 12px; }
        .progress .dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65em; font-weight: 700; color: white; flex-shrink: 0; }
        .progress .dot.done { background: #27ae60; }
        .progress .dot.current { background: #3498db; animation: pulse 1.5s infinite; }
        .progress .dot.pending { background: #ddd; color: #999; }
        .progress .line { height: 3px; flex: 1; min-width: 20px; }
        .progress .line.done { background: #27ae60; }
        .progress .line.pending { background: #ddd; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
        .step-labels { display: flex; justify-content: space-between; font-size: 0.65em; color: #999; margin-top: 4px; padding: 0 2px; }
    </style>
    <style th:replace="~{fragments/navbar :: navbar-styles}"></style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar('consumer-orders')}"></nav>
    <div class="topbar">
        <a th:href="@{'/consumer/restaurants?consumerId=' + ${consumerId}}">Browse Restaurants</a>
        <a href="#" class="active">My Orders</a>
        <div class="user-select">
            <span>Logged in as:</span>
            <select onchange="window.location='/consumer/orders?consumerId='+this.value">
                <option th:each="c : ${consumers}" th:value="${c.id}" th:text="${c.name}" th:selected="${c.id == consumerId}">Consumer</option>
            </select>
        </div>
    </div>
    <div class="container">
        <h2>My Orders</h2>

        <div th:if="${orders.isEmpty()}" class="empty">
            <p>You haven't placed any orders yet.</p>
            <a th:href="@{'/consumer/restaurants?consumerId=' + ${consumerId}}">Browse Restaurants &rarr;</a>
        </div>

        <div th:each="order : ${orders}" class="order-card">
            <div class="order-header">
                <div class="left">
                    <h3>
                        Order #<span th:text="${order.id}">1</span>
                        &mdash; <span th:text="${order.restaurant.name}">Restaurant</span>
                    </h3>
                    <span th:text="${#temporals.format(order.orderTime, 'dd MMM yyyy, hh:mm a')}">Time</span>
                </div>
                <span class="status" th:classappend="${order.status}" th:text="${order.status}">Status</span>
            </div>
            <div class="order-body">
                <div class="order-items">
                    <span th:each="item : ${order.lineItems}" class="order-item"
                          th:text="${item.menuItem.name + ' x ' + item.quantity}">Item</span>
                </div>
                <div class="order-meta">
                    <span><b>Total:</b> Rs.<span th:text="${order.totalAmount}">0</span></span>
                    <span><b>Delivery:</b> <span th:text="${order.deliveryAddress}">Address</span></span>
                </div>
                <!-- Progress tracker -->
                <div class="progress" th:with="
                    statusIdx=${order.status.name() == 'PLACED' ? 0 :
                                order.status.name() == 'APPROVED' ? 1 :
                                order.status.name() == 'PREPARING' ? 2 :
                                order.status.name() == 'READY_FOR_PICKUP' ? 3 :
                                order.status.name() == 'PICKED_UP' ? 4 :
                                order.status.name() == 'DELIVERED' ? 5 : 0}">
                    <div class="dot" th:classappend="${statusIdx > 0 ? 'done' : 'current'}">1</div>
                    <div class="line" th:classappend="${statusIdx >= 1 ? 'done' : 'pending'}"></div>
                    <div class="dot" th:classappend="${statusIdx > 1 ? 'done' : (statusIdx == 1 ? 'current' : 'pending')}">2</div>
                    <div class="line" th:classappend="${statusIdx >= 2 ? 'done' : 'pending'}"></div>
                    <div class="dot" th:classappend="${statusIdx > 2 ? 'done' : (statusIdx == 2 ? 'current' : 'pending')}">3</div>
                    <div class="line" th:classappend="${statusIdx >= 3 ? 'done' : 'pending'}"></div>
                    <div class="dot" th:classappend="${statusIdx > 3 ? 'done' : (statusIdx == 3 ? 'current' : 'pending')}">4</div>
                    <div class="line" th:classappend="${statusIdx >= 4 ? 'done' : 'pending'}"></div>
                    <div class="dot" th:classappend="${statusIdx > 4 ? 'done' : (statusIdx == 4 ? 'current' : 'pending')}">5</div>
                    <div class="line" th:classappend="${statusIdx >= 5 ? 'done' : 'pending'}"></div>
                    <div class="dot" th:classappend="${statusIdx == 5 ? 'done' : 'pending'}">6</div>
                </div>
                <div class="step-labels">
                    <span>Placed</span><span>Approved</span><span>Preparing</span><span>Ready</span><span>Picked Up</span><span>Delivered</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
