spring.application.name=ftgo-monolith
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:ftgodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/h2-console

# Initialize data after schema creation
spring.sql.init.mode=always

# ── Eureka Service Discovery ──
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Restaurant Service — use Eureka service name (no hardcoded URL)
restaurant-service.url=http://RESTAURANT-SERVICE

# ── Kafka Producer ──
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=2147483647
spring.kafka.producer.properties.retry.backoff.ms=100
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.batch-size=16384
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# ── Resilience4j Circuit Breaker ──
# Circuit breaker for restaurant-service calls
resilience4j.circuitbreaker.instances.restaurant-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.restaurant-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.restaurant-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.restaurant-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.restaurant-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.restaurant-service.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.restaurant-service.minimum-number-of-calls=5

# ── Resilience4j Retry ──
resilience4j.retry.instances.restaurant-service.max-attempts=3
resilience4j.retry.instances.restaurant-service.wait-duration=500ms
resilience4j.retry.instances.restaurant-service.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.io.IOException

# ── Resilience4j Rate Limiter ──
resilience4j.ratelimiter.instances.restaurant-service.limit-for-period=50
resilience4j.ratelimiter.instances.restaurant-service.limit-refresh-period=1s
resilience4j.ratelimiter.instances.restaurant-service.timeout-duration=0s

# ── Actuator — expose Resilience4j health + metrics ──
management.endpoints.web.exposure.include=health,info,circuitbreakers,metrics
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
