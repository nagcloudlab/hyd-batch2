services:

  # ── Eureka Discovery Server ──
  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"

  # ── Kafka in KRaft mode (no Zookeeper) ──
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # ── Kafka UI ──
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ftgo-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # ── Restaurant Service (extracted — Phase 2) ──
  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on:
      - discovery-server

  # ── Delivery Service (extracted — Phase 3) ──
  delivery-service:
    build: ./delivery-service
    container_name: delivery-service
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on:
      - kafka
      - discovery-server

  # ── Monolith (shrunk further — order + payment + billing only) ──
  ftgo-monolith:
    build: ./ftgo-monolith
    container_name: ftgo-monolith
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on:
      - kafka
      - discovery-server
      - restaurant-service

  # ── Notification Service (extracted — Phase 1) ──
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on:
      - kafka
      - discovery-server
