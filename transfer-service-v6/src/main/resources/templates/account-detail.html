<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
    Demonstrates @PathVariable — URL: /accounts/123 -> accountNumber = "123"
    Controller extracts the value from the URL and passes the Account to the Model
    th:text safely renders model attribute fields
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Detail - Transfer Service v6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Transfer Service</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/transfer">New Transfer</a>
                <a class="nav-link active" href="/accounts">Accounts</a>
                <a class="nav-link" href="/transfer-history">History</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Account Details</h5>
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-5">Account Number</dt>
                            <dd class="col-sm-7" th:text="${account.number}">123</dd>

                            <dt class="col-sm-5">Balance</dt>
                            <dd class="col-sm-7" th:text="|$${account.balance}|">$1000.00</dd>
                        </dl>
                    </div>
                    <div class="card-footer">
                        <a href="/accounts" class="btn btn-outline-secondary btn-sm">Back to Accounts</a>
                        <a href="/transfer" class="btn btn-primary btn-sm">Transfer Funds</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
