<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
    Thymeleaf template — processed server-side before sending HTML to browser
    th:object  — binds the form to a model attribute (TransferRequest)
    th:field   — binds input to a field on th:object (generates name/id/value)
    th:errors  — shows validation error messages for a field
    th:if      — conditional rendering
    th:each    — iterate over a collection (accounts dropdown)
    th:action  — generates the form action URL (context-path aware)
    #fields.hasGlobalErrors() — checks for cross-field validation errors
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Transfer - Transfer Service v6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Transfer Service</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/transfer">New Transfer</a>
                <a class="nav-link" href="/accounts">Accounts</a>
                <a class="nav-link" href="/transfer-history">History</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Transfer Funds</h5>
                    </div>
                    <div class="card-body">

                        <!-- th:object binds this form to the "transferRequest" model attribute -->
                        <!-- th:action @{/transfer} is Thymeleaf URL syntax (context-path aware) -->
                        <form th:action="@{/transfer}" th:object="${transferRequest}" method="post">

                            <!-- Global errors — cross-field validation (e.g., same-account check) -->
                            <!-- These come from bindingResult.reject() in the controller -->
                            <!-- #fields.hasGlobalErrors() MUST be inside <form th:object> for context -->
                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0">
                                    Global error message
                                </p>
                            </div>

                            <div class="mb-3">
                                <label for="fromAccount" class="form-label">From Account</label>
                                <!-- <select> with th:each — dropdown populated by @ModelAttribute("accounts") -->
                                <select class="form-select" th:field="*{fromAccount}"
                                        th:classappend="${#fields.hasErrors('fromAccount')} ? 'is-invalid'">
                                    <option value="">-- Select Account --</option>
                                    <!-- th:each iterates over accounts list from @ModelAttribute method -->
                                    <option th:each="acc : ${accounts}"
                                            th:value="${acc.number}"
                                            th:text="|${acc.number} — Balance: $${acc.balance}|">
                                        123 — Balance: $1000.00
                                    </option>
                                </select>
                                <!-- th:errors shows Bean Validation message for this field -->
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fromAccount')}"
                                     th:errors="*{fromAccount}">From account error</div>
                            </div>

                            <div class="mb-3">
                                <label for="toAccount" class="form-label">To Account</label>
                                <select class="form-select" th:field="*{toAccount}"
                                        th:classappend="${#fields.hasErrors('toAccount')} ? 'is-invalid'">
                                    <option value="">-- Select Account --</option>
                                    <option th:each="acc : ${accounts}"
                                            th:value="${acc.number}"
                                            th:text="|${acc.number} — Balance: $${acc.balance}|">
                                        456 — Balance: $500.00
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('toAccount')}"
                                     th:errors="*{toAccount}">To account error</div>
                            </div>

                            <div class="mb-3">
                                <label for="amount" class="form-label">Amount ($)</label>
                                <!-- th:field="*{amount}" generates name="amount", id="amount", value="..." -->
                                <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{amount}"
                                       th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"
                                       placeholder="0.00">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('amount')}"
                                     th:errors="*{amount}">Amount error</div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Submit Transfer</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
