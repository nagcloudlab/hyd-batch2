<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transfer-service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container">
    <h1 class="mt-5">Welcome to the Transfer Service</h1>
    <hr/>
    <ul class="nav nav-pills">
        <li class="nav-item">
            <a class="nav-link" href="/transfer">Transfer</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/transfer-history">Transfer History</a>
        </li>
    </ul>
    <hr/>

    <div class="row">
        <div class="col-6">
            <div class="card">
                <div class="card-header">Transfer Form</div>
                <div class="card-body">
                <form action="/transfer" method="post">
                    <div class="mb-3">
                        <label for="fromAccount" class="form-label">From Account</label>
                        <input type="text" class="form-control" id="fromAccount" name="fromAccount" required>
                    </div>
                    <div class="mb-3">
                        <label for="toAccount" class="form-label">To Account</label>
                        <input type="text" class="form-control" id="toAccount" name="toAccount" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Transfer</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
