<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
    Demonstrates th:each — iterates over a collection from the Model
    th:each="account : ${accounts}" — loops over each Account
    th:text="${account.number}" — safely outputs the value
    th:href="@{/accounts/{id}(id=${account.number})}" — dynamic URL with @PathVariable
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - Transfer Service v6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Transfer Service</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/transfer">New Transfer</a>
                <a class="nav-link active" href="/accounts">Accounts</a>
                <a class="nav-link" href="/transfer-history">History</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">All Accounts</h5>
                    </div>
                    <div class="card-body">

                        <!-- th:if — conditional: show message when list is empty -->
                        <div th:if="${#lists.isEmpty(accounts)}" class="alert alert-info">
                            No accounts found.
                        </div>

                        <table class="table table-striped table-hover" th:if="${!#lists.isEmpty(accounts)}">
                            <thead class="table-dark">
                                <tr>
                                    <th>Account Number</th>
                                    <th>Balance</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- th:each — iterates over the accounts list -->
                                <tr th:each="account : ${accounts}">
                                    <td th:text="${account.number}">123</td>
                                    <!-- th:text with string concat using | literal substitution | -->
                                    <td th:text="|$${account.balance}|">$1000.00</td>
                                    <td>
                                        <!-- th:href with path variable expression -->
                                        <a th:href="@{/accounts/{id}(id=${account.number})}"
                                           class="btn btn-sm btn-outline-primary">View Details</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
