<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
    Demonstrates th:each on a more complex object (TxnHistory with @ManyToOne Account)
    th:text navigates object graph: ${txn.account.number} accesses the related Account
    th:classappend conditionally adds CSS classes based on data
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer History - Transfer Service v6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Transfer Service</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/transfer">New Transfer</a>
                <a class="nav-link" href="/accounts">Accounts</a>
                <a class="nav-link active" href="/transfer-history">History</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Transfer History</h5>
                    </div>
                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(history)}" class="alert alert-info">
                            No transactions yet. Make a transfer to see history.
                        </div>

                        <table class="table table-striped table-hover" th:if="${!#lists.isEmpty(history)}">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Account</th>
                                    <th>Type</th>
                                    <th>Amount</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="txn : ${history}">
                                    <td th:text="${txn.id}">1</td>
                                    <!-- Navigate object graph: txn -> account -> number -->
                                    <td th:text="${txn.account.number}">123</td>
                                    <td>
                                        <!-- th:classappend — conditionally add CSS class based on transfer type -->
                                        <span class="badge"
                                              th:classappend="${txn.transferType.name() == 'DEBIT'} ? 'bg-danger' : 'bg-success'"
                                              th:text="${txn.transferType}">DEBIT</span>
                                    </td>
                                    <td th:text="|$${txn.amount}|">$100.00</td>
                                    <td th:text="${txn.timestamp}">2024-01-01 12:00</td>
                                </tr>
                            </tbody>
                        </table>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
