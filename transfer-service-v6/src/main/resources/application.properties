# Application name
spring.application.name=transfer-service-v6

# Database connection — Postgres running in Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=postgres
spring.datasource.password=mysecretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate — auto-create/update tables from @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf — auto-configured: prefix=classpath:/templates/, suffix=.html
# Disable cache for dev (DevTools does this automatically)
spring.thymeleaf.cache=false

# Custom business property — injected via @Value in TransferServiceImpl
npci.transfer.limit=20000.00


# Swagger/OpenAPI configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html