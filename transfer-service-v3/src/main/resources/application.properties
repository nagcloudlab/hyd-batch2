# Database connection — Postgres running in Docker (see Notes.txt for setup)
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=postgres
spring.datasource.password=mysecretpassword

# JDBC driver class — loaded by HikariCP to create connections
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — max number of active connections to the database
# In production, tune based on: pool size = (core_count * 2) + disk_spindles
spring.datasource.maximum-pool-size=10
