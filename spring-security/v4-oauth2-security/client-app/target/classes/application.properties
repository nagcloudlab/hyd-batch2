server.port=8080
spring.application.name=client-app

# OAuth2 Client Registration - connect to our Auth Server
spring.security.oauth2.client.registration.my-auth-server.client-id=client-app
spring.security.oauth2.client.registration.my-auth-server.client-secret=secret
spring.security.oauth2.client.registration.my-auth-server.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.my-auth-server.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.my-auth-server.scope=openid,profile,read

# Auth Server provider details
spring.security.oauth2.client.provider.my-auth-server.issuer-uri=http://localhost:9000
